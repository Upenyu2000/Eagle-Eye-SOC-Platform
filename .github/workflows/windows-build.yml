name: Build Windows application

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller --noconfirm --clean EagleEye.spec

      - name: Create portable ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist\EagleEye\*" -DestinationPath "dist\Eagle-Eye-SOC-Platform-Windows-x64.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\EagleEye.iss"'

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eagle-eye-windows
          path: |
            dist/Eagle-Eye-SOC-Platform-Windows-x64.zip
            dist/Eagle-Eye-Setup-x64.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Eagle-Eye-SOC-Platform-Windows-x64.zip
            dist/Eagle-Eye-Setup-x64.exe
